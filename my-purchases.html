<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Purchases | Artivio</title>
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
  <script src="assets/lucide.min.js"></script>
  <link rel="stylesheet" href="navbar.css">
  
  <style>
    :root {
      --primary: #6C2929;
      --bg: #fdf6ee;
      --card: #ffffff;
      --border: #e5e7eb;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      color: var(--primary);
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .tab-btn {
      padding: 10px 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      border-radius: 8px;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .purchase-card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .purchase-image {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
      background: #f0f0f0;
    }

    .purchase-info {
      flex: 1;
    }

    .purchase-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 5px;
    }

    .purchase-meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 5px;
    }

    .purchase-price {
      font-weight: bold;
      color: var(--primary);
    }

    .view-btn {
      background: var(--primary);
      color: white;
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .track-btn {
      background: #6b7280;
      color: white;
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-left: 10px;
    }

    .view-btn:hover, .track-btn:hover {
      opacity: 0.9;
    }

    .empty-state {
      text-align: center;
      padding: 60px;
      background: white;
      border-radius: 12px;
    }

    .empty-state i {
      font-size: 60px;
      color: #ccc;
      margin-bottom: 20px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      overflow-y: auto;
    }

    .modal-content {
      background: white;
      margin: 5% auto;
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 800px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      color: var(--primary);
    }

    .close-modal {
      font-size: 28px;
      cursor: pointer;
      color: #666;
    }

    .video-container {
      margin: 0 auto 20px;
      max-width: 700px;
      width: 100%;
    }

    video {
      width: 100%;
      max-height: 400px;
      border-radius: 10px;
      background: #000;
      display: block;
      object-fit: contain;
    }

    .part-list {
      margin-top: 20px;
    }

    .part-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .part-item:hover {
      background: #f5f5f5;
    }

    .part-item.active {
      background: #f0e8e4;
      border-color: var(--primary);
    }

    .part-title {
      font-weight: 600;
      color: var(--primary);
    }

    .button-group {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>

<header class="navbar">
  <div class="container nav-content">
    <div class="nav-logo">
      <img src="no background 1.png" alt="Artivio Logo">
      <span class="artivio">Artivio</span>
    </div>
    <nav>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html"><i data-lucide="shopping-bag" class="icon-sm"></i> Products</a></li>
        <li><a href="customercourses.html"><i data-lucide="book-open" class="icon-sm"></i> Courses</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="track-order.html"><i data-lucide="truck" class="icon-sm"></i> Track Order</a></li>
        <li><a id="loginLink" href="login.html"><i data-lucide="user" class="icon-sm"></i> Login</a></li>
      </ul>
      <div class="menu-icon" id="menuIcon">
        <i data-lucide="menu"></i>
      </div>
    </nav>
  </div>
</header>

<div class="container">
  <h1>My Purchases</h1>
  <p class="subtitle">View all your purchased products and courses</p>

  <div class="tabs">
    <button class="tab-btn active" data-tab="courses">Courses</button>
    <button class="tab-btn" data-tab="products">Products</button>
  </div>

  <div id="courses-tab" class="tab-content active">
    <div id="coursesList"></div>
  </div>

  <div id="products-tab" class="tab-content">
    <div id="productsList"></div>
  </div>
</div>

<div id="courseModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalCourseTitle">Course Title</h3>
      <span class="close-modal" id="closeModalBtn">&times;</span>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  const API_BASE = window.location.origin;
  let purchasedCourses = [];
  let purchasedProducts = [];
  let courseDataStore = {};

  function getToken() {
    try { return localStorage.getItem('token'); } catch(e) { return null; }
  }

  function formatPrice(price) {
    return `LE ${parseFloat(price).toFixed(2)}`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function loadPurchases() {
    const token = getToken();
    if (!token) {
      window.location.href = 'login.html';
      return;
    }

    document.getElementById('coursesList').innerHTML = '<div class="empty-state"><i class="fa-solid fa-spinner fa-pulse"></i><h3>Loading your purchases...</h3></div>';
    document.getElementById('productsList').innerHTML = '<div class="empty-state"><i class="fa-solid fa-spinner fa-pulse"></i><h3>Loading your purchases...</h3></div>';

    try {
      const ordersRes = await fetch(`${API_BASE}/api/orders/my-orders`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const ordersData = await ordersRes.json();
      const paidOrders = (ordersData.data || []).filter(order => order.paymentStatus === 'paid');

      const coursesMap = new Map();
      const productsMap = new Map();
      
      paidOrders.forEach(order => {
        order.items.forEach(item => {
          if (item.itemType === 'Course') {
            if (!coursesMap.has(item.item)) {
              coursesMap.set(item.item, {
                id: item.item,
                title: item.name,
                price: item.price,
                quantity: item.quantity,
                image: null,
                orderId: order._id
              });
            }
          } else if (item.itemType === 'Product') {
            if (!productsMap.has(item.item)) {
              productsMap.set(item.item, {
                id: item.item,
                name: item.name,
                price: item.price,
                quantity: item.quantity,
                category: item.category || 'Handmade',
                image: null,
                orderId: order._id
              });
            }
          }
        });
      });

      purchasedCourses = Array.from(coursesMap.values());
      purchasedProducts = Array.from(productsMap.values());

      for (const course of purchasedCourses) {
        try {
          const res = await fetch(`${API_BASE}/api/courses/${course.id}`, {
            headers: token ? { 'Authorization': `Bearer ${token}` } : {}
          });
          if (res.ok) {
            const data = await res.json();
            if (data.success && data.data) {
              course.image = data.data.image;
              course.duration = data.data.duration;
              course.parts = data.data.parts;
            }
          }
        } catch (e) {}
      }

      for (const product of purchasedProducts) {
        try {
          const res = await fetch(`${API_BASE}/api/products/${product.id}`, {
            headers: token ? { 'Authorization': `Bearer ${token}` } : {}
          });
          if (res.ok) {
            const data = await res.json();
            if (data.success && data.data) {
              product.image = data.data.image;
              product.category = data.data.category || product.category;
            }
          }
        } catch (e) {}
      }

      renderCourses();
      renderProducts();
    } catch (err) {
      renderCourses();
      renderProducts();
    }
  }

  function renderCourses() {
    const container = document.getElementById('coursesList');
    if (purchasedCourses.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-book-open"></i>
          <h3>No Courses Purchased Yet</h3>
          <p>Browse our courses and start learning today!</p>
          <a href="customercourses.html"><button class="view-btn" style="margin-top: 15px;">Explore Courses</button></a>
        </div>
      `;
      return;
    }

    container.innerHTML = purchasedCourses.map(course => `
      <div class="purchase-card">
        <img src="${course.image ? `${API_BASE}/uploads/${course.image}` : 'assets/no-background.png'}" class="purchase-image" onerror="this.src='assets/no-background.png'">
        <div class="purchase-info">
          <div class="purchase-title">${escapeHtml(course.title)}</div>
          <div class="purchase-meta">${course.duration || 0} hours • Qty: ${course.quantity || 1}</div>
          <div class="purchase-price">Paid: ${formatPrice(course.price)}</div>
        </div>
        <div class="button-group">
          <button class="view-btn" data-course-id="${course.id}">View Course</button>
          <button class="track-btn" data-order-id="${course.orderId}">Track Order</button>
        </div>
      </div>
    `).join('');

    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const courseId = this.getAttribute('data-course-id');
        viewCourse(courseId);
      });
    });

    document.querySelectorAll('.track-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const orderId = this.getAttribute('data-order-id');
        window.location.href = `track-order.html?order=${orderId}`;
      });
    });
  }

  function renderProducts() {
    const container = document.getElementById('productsList');
    if (purchasedProducts.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-shopping-bag"></i>
          <h3>No Products Purchased Yet</h3>
          <p>Discover unique handmade products from our artisans!</p>
          <a href="product.html"><button class="view-btn" style="margin-top: 15px;">Shop Now</button></a>
        </div>
      `;
      return;
    }

    container.innerHTML = purchasedProducts.map(product => `
      <div class="purchase-card">
        <img src="${product.image ? `${API_BASE}/uploads/${product.image}` : 'assets/no-background.png'}" class="purchase-image" onerror="this.src='assets/no-background.png'">
        <div class="purchase-info">
          <div class="purchase-title">${escapeHtml(product.name)}</div>
          <div class="purchase-meta">${product.category || 'Handmade'} • Qty: ${product.quantity || 1}</div>
          <div class="purchase-price">Paid: ${formatPrice(product.price)}</div>
        </div>
        <div class="button-group">
          <button class="track-btn" data-order-id="${product.orderId}">Track Order</button>
        </div>
      </div>
    `).join('');

    document.querySelectorAll('.track-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const orderId = this.getAttribute('data-order-id');
        window.location.href = `track-order.html?order=${orderId}`;
      });
    });
  }

  async function viewCourse(courseId) {
    const token = getToken();
    try {
      if (!courseDataStore[courseId]) {
        const res = await fetch(`${API_BASE}/api/courses/${courseId}`, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });
        if (!res.ok) {
          alert('This course is currently unavailable.');
          return;
        }
        const data = await res.json();
        if (data.success && data.data) {
          courseDataStore[courseId] = data.data;
        }
      }
      
      const course = courseDataStore[courseId];
      if (!course) {
        alert('Course data not available');
        return;
      }
      
      const parts = course.parts || [];
      const modal = document.getElementById('courseModal');
      const modalTitle = document.getElementById('modalCourseTitle');
      const modalContent = document.getElementById('modalContent');
      
      modalTitle.textContent = course.title;
      
      if (parts.length === 0) {
        modalContent.innerHTML = '<p>No lessons available for this course yet.</p>';
      } else {
        modalContent.innerHTML = `
          <div class="video-container" id="videoContainer">
            <video id="courseVideo" controls style="width:100%; border-radius:8px;">
              <source id="videoSource" src="">
              Your browser does not support video playback.
            </video>
          </div>
          <div class="part-list" id="partList"></div>
        `;
        
        const partList = document.getElementById('partList');
        parts.forEach((part, index) => {
          const partDiv = document.createElement('div');
          partDiv.className = 'part-item';
          partDiv.setAttribute('data-part-index', index);
          partDiv.setAttribute('data-part-video', part.video || '');
          partDiv.innerHTML = `
            <div class="part-title">Lesson ${part.partNumber || index + 1}: ${escapeHtml(part.title)}</div>
            <div style="font-size: 13px; color: #666;">${part.duration || 0} minutes</div>
          `;
          partDiv.addEventListener('click', function() {
            const videoUrl = this.getAttribute('data-part-video');
            const videoPlayer = document.getElementById('courseVideo');
            const videoSource = document.getElementById('videoSource');
            if (videoUrl) {
              videoSource.src = `${API_BASE}/uploads/${videoUrl}`;
              videoPlayer.load();
              videoPlayer.play();
            } else {
              alert('No video available for this lesson');
            }
            
            document.querySelectorAll('.part-item').forEach(item => {
              item.classList.remove('active');
            });
            this.classList.add('active');
          });
          partList.appendChild(partDiv);
        });
        
        if (parts[0] && parts[0].video) {
          const videoPlayer = document.getElementById('courseVideo');
          const videoSource = document.getElementById('videoSource');
          videoSource.src = `${API_BASE}/uploads/${parts[0].video}`;
          videoPlayer.load();
          document.querySelector('.part-item')?.classList.add('active');
        }
      }
      
      modal.style.display = 'block';
    } catch (err) {
      alert('Failed to load course details');
    }
  }

  function closeCourseModal() {
    document.getElementById('courseModal').style.display = 'none';
    const videoPlayer = document.getElementById('courseVideo');
    if (videoPlayer) videoPlayer.pause();
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    const activeBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
    if (activeBtn) activeBtn.classList.add('active');
    document.getElementById(`${tab}-tab`).classList.add('active');
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (window.lucide) lucide.createIcons();
    loadPurchases();
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const tab = this.getAttribute('data-tab');
        switchTab(tab);
      });
    });
    
    document.getElementById('closeModalBtn')?.addEventListener('click', closeCourseModal);
    window.addEventListener('click', function(e) {
      const modal = document.getElementById('courseModal');
      if (e.target === modal) closeCourseModal();
    });
    
    const menuIcon = document.getElementById('menuIcon');
    const navLinks = document.getElementById('navLinks');
    if (menuIcon && navLinks) {
      menuIcon.addEventListener('click', () => navLinks.classList.toggle('active'));
    }
  });
</script>
<script src="navbar.js"></script>
</body>
</html>
