<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled - Artivio</title>
  <script src="assets/lucide.min.js"></script>
  <link rel="stylesheet" href="navbar.css">
  
  <style>
    :root {
      --primary: #6C2929;
      --light-bg: #fdf6ee;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: var(--light-bg);
      color: #333;
    }

    .cancel-container {
      max-width: 600px;
      margin: 80px auto;
      text-align: center;
      background: #fff;
      border-radius: 16px;
      padding: 50px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .cancel-icon {
      width: 80px;
      height: 80px;
      background: #fee2e2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
      color: #dc2626;
    }

    h1 {
      color: #dc2626;
      margin-bottom: 15px;
    }

    p {
      color: #666;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      margin: 0 10px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-outline {
      border: 1px solid var(--primary);
      color: var(--primary);
      background: transparent;
    }
  </style>
</head>
<body>
<script src="config.js"></script>

<header class="navbar">
  <div class="container nav-content">
    <div class="nav-logo">
      <img src="no background 1.png" alt="Artivio Logo">
      <span class="artivio">Artivio</span>
    </div>
    <nav>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html"><i data-lucide="shopping-bag" class="icon-sm"></i> Products</a></li>
        <li><a href="customercourses.html"><i data-lucide="book-open" class="icon-sm"></i> Courses</a></li>
        <li><a href="about.html">About</a></li>
        <li><a id="loginLink" href="login.html"><i data-lucide="user" class="icon-sm"></i> Login</a></li>
      </ul>
      <div class="menu-icon" id="menuIcon">
        <i data-lucide="menu"></i>
      </div>
    </nav>
  </div>
</header>

<div class="cancel-container">
  <div class="cancel-icon">✕</div>
  <h1>Payment Cancelled</h1>
  <p>Your payment was not completed. You have not been charged.</p>
  <div>
    <a href="product.html" class="btn btn-primary">Continue Shopping</a>
    <a href="checkout.html" class="btn btn-outline">Try Again</a>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (window.lucide) lucide.createIcons();
    const menuIcon = document.getElementById('menuIcon');
    const navLinks = document.getElementById('navLinks');
    if (menuIcon && navLinks) {
      menuIcon.addEventListener('click', () => navLinks.classList.toggle('active'));
    }
  });
</script>

<script src="navbar.js"></script>
</body>
</html>
