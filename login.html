<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Artisan Crafts</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://omarezzat7070.github.io/artivio/assets/fontawesome/css/all.min.css">

  <script src="assets/lucide.min.js"></script>

  <!-- ===== INTERNAL CSS ===== -->
  <style>
    :root {
  --primary: #6C2929;
  --dark: #3d1616;
  --light-bg: #fdf6ee;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: var(--light-bg);
  color: #333;
}

/* ===== Login Section ===== */
.login-section {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: calc(100vh - 80px);
}

.login-container {
  background: #fff;
  width: 100%;
  max-width: 420px;
  padding: 35px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: center;
}

.login-container h1 {
  color: #8b4000;
  margin-bottom: 8px;
}

.subtitle {
  color: #666;
  margin-bottom: 25px;
  font-size: 14px;
}

/* Toggle */
.role-toggle {
  display: flex;
  background: #f1f1f1;
  border-radius: 30px;
  margin-bottom: 25px;
  padding: 4px;
}

.role-toggle button {
  flex: 1;
  border: none;
  padding: 10px;
  background: transparent;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 600;
}

.role-toggle .active {
  background: #fff;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

/* Form */
.login-form {
  text-align: left;
}

.login-form label {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 5px;
  display: block;
}

.input-box {
  display: flex;
  align-items: center;
  background: #f4f4f4;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 18px;
}

.input-box i {
  margin-right: 10px;
  color: #999;
}

.input-box input {
  border: none;
  background: transparent;
  outline: none;
  width: 100%;
}

/* Button */
.login-btn {
  width: 100%;
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

.login-btn:hover {
  background: var(--primary);
}

/* Signup */
.signup-text {
  text-align: center;
  margin-top: 18px;
  font-size: 14px;
}

.signup-text a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}
.forgot-row {
  text-align: right;
  margin-top: -10px;
  margin-bottom: 12px;
}

.forgot-btn {
  background: none;
  border: none;
  color: var(--primary);
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
}

.forgot-panel {
  display: none;
  text-align: left;
  background: #faf6f5;
  border: 1px solid #ead9d4;
  border-radius: 12px;
  padding: 18px;
  margin-top: 20px;
}

.forgot-panel.active {
  display: block;
}

.forgot-panel h3 {
  color: var(--primary);
  margin-bottom: 6px;
}

.forgot-panel p {
  color: #666;
  font-size: 13px;
  margin-bottom: 14px;
}

.secondary-btn {
  width: 100%;
  background: #e5e7eb;
  color: #333;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}
  </style>
  <link rel="stylesheet" href="navbar.css">
</head>
<body>
<script src="config.js"></script>
<script>const API_BASE = window.API_BASE || window.location.origin;</script>

<!-- ===== Navbar ===== -->
<header class="navbar">
  <div class="container nav-content">
    <div class="nav-logo">
      <a  href="index.html"><img src="no background 1.png" alt="Artivio Logo"></a>
      <span class="artivio">Artivio</span>
    </div>

    <nav>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html"><i data-lucide="shopping-bag" class="icon-sm"></i> Products</a></li>
        <li><a href="customercourses.html"><i data-lucide="book-open" class="icon-sm"></i> Courses</a></li>
        <li><a href="about.html">About</a></li>
        <li><a id="loginLink" href="login.html"><i data-lucide="user" class="icon-sm"></i> Login</a></li>
      </ul>
      <div class="menu-icon" id="menuIcon">
        <i data-lucide="menu"></i>
      </div>
    </nav>
  </div>
</header>

<!-- ===== Login Section ===== -->
<section class="login-section">
  <div class="login-container">

    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your account</p>

    <!-- Toggle -->
    <div class="role-toggle">
      <button class="active" id="customerBtn">Customer</button>
      <button id="artisanBtn">Artisan</button>
    </div>

    <!-- Form -->
    <form class="login-form" id="loginForm">
  <label for="email">Email</label>
  <div class="input-box">
    <i class="fa-regular fa-envelope"></i>
    <input type="email" id="email" name="email" autocomplete="email" placeholder="your@email.com" required>
  </div>

  <label for="password">Password</label>
  <div class="input-box">
    <i class="fa-solid fa-lock"></i>
    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
  </div>

  <div class="forgot-row">
    <button type="button" class="forgot-btn" id="showForgotBtn">Forgot password?</button>
  </div>

      <button type="submit" class="login-btn" id="loginBtn">
        Sign In as Customer
      </button>

      <p class="signup-text" id="loginMessage" role="status" aria-live="polite"></p>

      <p class="signup-text">
        Don't have an account?
        <a href="sign-up.html">Sign up</a>
      </p>
    </form>
    <div class="forgot-panel" id="forgotPanel">
      <h3>Reset Password</h3>
      <p>Enter the same full name and email on your account, then choose a new password.</p>

      <form id="forgotPasswordForm">
        <label for="forgotName">Full Name</label>
        <div class="input-box">
          <i class="fa-regular fa-user"></i>
          <input type="text" id="forgotName" placeholder="Your full name" required>
        </div>

        <label for="forgotEmail">Email</label>
        <div class="input-box">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="forgotEmail" placeholder="your@email.com" required>
        </div>

        <label for="forgotNewPassword">New Password</label>
        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="forgotNewPassword" placeholder="At least 6 characters" required>
        </div>

        <button type="submit" class="login-btn" id="resetPasswordBtn">Reset Password</button>
        <button type="button" class="secondary-btn" id="hideForgotBtn">Back to Login</button>
        <p class="signup-text" id="forgotMessage" role="status" aria-live="polite"></p>
      </form>
    </div>
  </div>
</section>

<!-- ===== INTERNAL JS ===== -->
<script>
document.addEventListener('DOMContentLoaded', function(){
  if (window.lucide) lucide.createIcons();
  const menuIcon = document.getElementById('menuIcon');
  const navLinks = document.getElementById('navLinks');
  if (menuIcon && navLinks) menuIcon.addEventListener('click', () => navLinks.classList.toggle('active'));

  const customerBtn = document.getElementById("customerBtn");
  const artisanBtn = document.getElementById("artisanBtn");
  const loginBtn = document.getElementById("loginBtn");
  const loginForm = document.getElementById("loginForm");
  const loginMessage = document.getElementById("loginMessage");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const showForgotBtn = document.getElementById("showForgotBtn");
  const hideForgotBtn = document.getElementById("hideForgotBtn");
  const forgotPanel = document.getElementById("forgotPanel");
  const forgotPasswordForm = document.getElementById("forgotPasswordForm");
  const forgotMessage = document.getElementById("forgotMessage");
  const resetPasswordBtn = document.getElementById("resetPasswordBtn");
  const forgotName = document.getElementById("forgotName");
  const forgotEmail = document.getElementById("forgotEmail");
  const forgotNewPassword = document.getElementById("forgotNewPassword");
  let selectedRole = "customer";

  if (showForgotBtn && forgotPanel) {
    showForgotBtn.addEventListener("click", () => {
      forgotPanel.classList.add("active");
      forgotMessage.textContent = "";
      forgotEmail.value = emailInput.value.trim();
      forgotName.focus();
    });
  }

  if (hideForgotBtn && forgotPanel) {
    hideForgotBtn.addEventListener("click", () => {
      forgotPanel.classList.remove("active");
      forgotPasswordForm.reset();
      forgotMessage.textContent = "";
    });
  }

  if (customerBtn && artisanBtn && loginBtn) {
    customerBtn.addEventListener("click", (e) => {
      e.preventDefault();
      customerBtn.classList.add("active");
      artisanBtn.classList.remove("active");
      loginBtn.textContent = "Sign In as Customer";
      selectedRole = "customer";
    });

    artisanBtn.addEventListener("click", (e) => {
      e.preventDefault();
      artisanBtn.classList.add("active");
      customerBtn.classList.remove("active");
      loginBtn.textContent = "Sign In as Artisan";
      selectedRole = "artisan";
    });
  }

  if (loginForm) {
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      loginMessage.textContent = "";
      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";

      try {
        const response = await fetch(`${window.API_BASE}/api/users/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value
          })
        });

        const result = await response.json();
        if (!response.ok || !result.success) {
          loginMessage.style.color = "red";
          loginMessage.textContent = result.error || "Login failed";
          loginBtn.disabled = false;
          loginBtn.textContent = selectedRole === "artisan" ? "Sign In as Artisan" : "Sign In as Customer";
          return;
        }

        if (selectedRole === "artisan" && !["artisan", "seller"].includes(result.user.role)) {
          loginMessage.style.color = "red";
          loginMessage.textContent = "Please switch to Customer login for this account";
          loginBtn.disabled = false;
          loginBtn.textContent = "Sign In as Artisan";
          return;
        }
        if (selectedRole === "customer" && result.user.role !== "customer") {
          loginMessage.style.color = "red";
          loginMessage.textContent = "Please switch to Artisan login for this account";
          loginBtn.disabled = false;
          loginBtn.textContent = "Sign In as Customer";
          return;
        }

        localStorage.setItem("token", result.token);
        localStorage.setItem("user", JSON.stringify(result.user));

        loginMessage.style.color = "green";
        loginMessage.textContent = "Login successful. Redirecting...";

        setTimeout(() => {
          if (result.user.role === "admin") {
            window.location.href = "admindashboard.html";
          } else if (["artisan", "seller"].includes(result.user.role)) {
            window.location.href = "seller.html";
          } else {
            window.location.href = "index.html";
          }
        }, 700);
      } catch (err) {
        loginMessage.style.color = "red";
        loginMessage.textContent = "Network error. Please try again.";
        loginBtn.disabled = false;
        loginBtn.textContent = selectedRole === "artisan" ? "Sign In as Artisan" : "Sign In as Customer";
      }
    });
  }

  if (forgotPasswordForm) {
    forgotPasswordForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      forgotMessage.textContent = "";

      const name = forgotName.value.trim();
      const email = forgotEmail.value.trim();
      const newPassword = forgotNewPassword.value;

      if (!name || !email || !newPassword) {
        forgotMessage.style.color = "red";
        forgotMessage.textContent = "All fields are required";
        return;
      }

      if (newPassword.length < 6) {
        forgotMessage.style.color = "red";
        forgotMessage.textContent = "Password must be at least 6 characters";
        return;
      }

      resetPasswordBtn.disabled = true;
      resetPasswordBtn.textContent = "Resetting...";

      try {
        const response = await fetch(`${window.API_BASE}/api/users/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, newPassword })
        });

        const result = await response.json();
        if (!response.ok || !result.success) {
          forgotMessage.style.color = "red";
          forgotMessage.textContent = result.error || "Failed to reset password";
          resetPasswordBtn.disabled = false;
          resetPasswordBtn.textContent = "Reset Password";
          return;
        }

        forgotMessage.style.color = "green";
        forgotMessage.textContent = "Password reset successfully. You can sign in now.";
        passwordInput.value = "";
        forgotPasswordForm.reset();
        setTimeout(() => {
          forgotPanel.classList.remove("active");
          resetPasswordBtn.disabled = false;
          resetPasswordBtn.textContent = "Reset Password";
        }, 1200);
      } catch (err) {
        forgotMessage.style.color = "red";
        forgotMessage.textContent = "Network error. Please try again.";
        resetPasswordBtn.disabled = false;
        resetPasswordBtn.textContent = "Reset Password";
      }
    });
  }
});
</script>

<script src="navbar.js"></script>
</body>
</html>
