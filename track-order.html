<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | Artivio</title>
  <link rel="stylesheet" href="https://omarezzat7070.github.io/artivio/assets/fontawesome/css/all.min.css">
  <script src="assets/lucide.min.js"></script>
  <link rel="stylesheet" href="navbar.css">
  <style>
    :root {
      --primary: #6C2929;
      --primary-light: #8b4545;
      --bg: #fdf6ee;
      --card: #ffffff;
      --border: #e5e7eb;
      --success: #10b981;
      --pending: #f59e0b;
      --completed: #6b7280;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .track-card {
      background: var(--card);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      color: var(--primary);
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }

    .search-form {
      background: #f9f9f9;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .track-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      transition: background 0.3s;
    }

    .track-btn:hover:not(:disabled) {
      background: var(--primary-light);
    }

    .track-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .order-details {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      display: none;
    }

    .estimated-delivery {
      background: #fef3c7;
      padding: 14px;
      border-radius: 8px;
      margin: 16px 0;
      text-align: center;
    }

    .delivery-countdown-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
    }

    .delivery-countdown-line i {
      color: var(--pending);
    }

    .timeline {
      margin: 20px 0;
      position: relative;
      padding-left: 30px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 28px;
    }

    .timeline-dot {
      position: absolute;
      left: -30px;
      top: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 3px solid var(--border);
      z-index: 1;
    }

    .timeline-item.completed .timeline-dot {
      background: var(--success);
      border-color: var(--success);
    }

    .timeline-item.active .timeline-dot {
      background: var(--primary);
      border-color: var(--primary);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(108, 41, 41, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(108, 41, 41, 0); }
      100% { box-shadow: 0 0 0 0 rgba(108, 41, 41, 0); }
    }

    .timeline-title {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .timeline-desc {
      font-size: 13px;
      color: #666;
    }

    .timeline-date {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }

    .items-list {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0 0;
      font-weight: bold;
      font-size: 16px;
      color: var(--primary);
    }

    @media (max-width: 600px) {
      .container { margin: 20px auto; padding: 15px; }
      .track-card { padding: 20px; }
      .timeline { padding-left: 20px; }
      .timeline-dot { left: -22px; width: 18px; height: 18px; }
    }
  </style>
</head>
<body>
<script src="config.js"></script>

<header class="navbar">
  <div class="container nav-content">
    <div class="nav-logo">
      <a href="index.html"><img src="no background 1.png" alt="Artivio Logo"></a>
      <span class="artivio">Artivio</span>
    </div>
    <nav>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html"><i data-lucide="shopping-bag" class="icon-sm"></i> Products</a></li>
        <li><a href="customercourses.html"><i data-lucide="book-open" class="icon-sm"></i> Courses</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="track-order.html"><i data-lucide="truck" class="icon-sm"></i> Track Order</a></li>
        <li><a id="loginLink" href="login.html"><i data-lucide="user" class="icon-sm"></i> Login</a></li>
      </ul>
      <div class="menu-icon" id="menuIcon">
        <i data-lucide="menu"></i>
      </div>
    </nav>
  </div>
</header>

<div class="container">
  <div class="track-card">
    <h1>Track Your Order</h1>
    <p class="subtitle">Enter your email to track your shipment</p>

    <div class="search-form">
      <div class="form-group">
        <label for="trackEmail">Email Address</label>
        <input type="email" id="trackEmail" placeholder="Enter your email address" required>
        <small style="color:#666; display:block; margin-top:5px;">We'll show all orders associated with this email</small>
      </div>
      <button class="track-btn" onclick="trackOrder()">
        <i class="fa-solid fa-search"></i> Track My Orders
      </button>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="orderDetails" class="order-details"></div>
  </div>
</div>

<script>
  const API_BASE = window.API_BASE || window.location.origin;

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function getStatusText(status) {
    const map = {
      pending_payment: 'Pending Payment',
      processing: 'Processing',
      shipped: 'Shipped',
      in_transit: 'In Transit',
      delivered: 'Delivered',
      completed: 'Completed'
    };
    return map[status] || status;
  }

  function formatRemainingTime(ms) {
    const safeMs = Math.max(0, Number(ms) || 0);
    const totalHours = Math.ceil(safeMs / (1000 * 60 * 60));
    const days = Math.floor(totalHours / 24);
    const hours = totalHours % 24;

    if (days > 0 && hours > 0) return days + ' day(s) and ' + hours + ' hour(s) left';
    if (days > 0) return days + ' day(s) left';
    if (hours > 0) return hours + ' hour(s) left';
    return 'Less than 1 hour left';
  }

  function buildDeliveryTracking(createdAt, items) {
    const now = new Date();
    const purchaseDate = createdAt ? new Date(createdAt) : new Date();
    const shippingDate = new Date(purchaseDate.getTime() + 3 * 86400000);
    const deliveryDate = new Date(shippingDate.getTime() + 2 * 86400000);

    const hasProduct = Array.isArray(items) && items.some(function(item) {
      return item.itemType === 'Product';
    });

    if (!hasProduct) {
      return {
        status: 'completed',
        message: 'Digital course purchase. No shipping is required.',
        remainingText: 'Available now in My Purchases',
        shippingDate: null,
        deliveryDate: null,
        timeline: [
          { title: 'Order Placed', description: 'Your order has been received', completed: true, timestamp: purchaseDate.toISOString() },
          { title: 'Payment Confirmed', description: 'Payment has been verified', completed: true, timestamp: purchaseDate.toISOString() },
          { title: 'Ready', description: 'Your course is available in My Purchases', completed: true, timestamp: purchaseDate.toISOString() }
        ]
      };
    }

    let status = 'processing';
    let message = 'Payment confirmed. Your product is being prepared for shipping.';

    if (now >= deliveryDate) {
      status = 'delivered';
      message = 'Your product should be delivered to the customer.';
    } else if (now >= shippingDate) {
      status = 'shipped';
      message = 'Your product is shipping to the customer.';
    }

    return {
      status: status,
      message: message,
      remainingText: now >= deliveryDate ? 'Delivered' : formatRemainingTime(deliveryDate - now),
      shippingDate: shippingDate.toISOString(),
      deliveryDate: deliveryDate.toISOString(),
      timeline: [
        {
          title: 'Order Placed',
          description: 'Your order has been received',
          completed: true,
          timestamp: purchaseDate.toISOString()
        },
        {
          title: 'Payment Confirmed',
          description: 'Payment has been verified',
          completed: true,
          timestamp: purchaseDate.toISOString()
        },
        {
          title: 'Preparing Product',
          description: 'This lasts 3 days after payment',
          completed: now >= shippingDate,
          timestamp: now >= shippingDate ? shippingDate.toISOString() : null
        },
        {
          title: 'Shipped',
          description: 'Shipping starts 3 days after payment',
          completed: now >= shippingDate,
          timestamp: now >= shippingDate ? shippingDate.toISOString() : null
        },
        {
          title: 'Delivered',
          description: 'Delivery is expected 2 days after shipping',
          completed: now >= deliveryDate,
          timestamp: now >= deliveryDate ? deliveryDate.toISOString() : null
        }
      ]
    };
  }

  function renderTrackingTimeline(timeline) {
    if (!Array.isArray(timeline) || timeline.length === 0) return '';

    let lastCompletedIndex = -1;
    for (let i = 0; i < timeline.length; i++) {
      if (timeline[i].completed) lastCompletedIndex = i;
    }
    const activeIndex = lastCompletedIndex + 1;

    return timeline.map(function(event, index) {
      let cls = '';
      if (event.completed) {
        cls = 'completed';
      } else if (index === activeIndex) {
        cls = 'active';
      }

      const dateDisplay = event.timestamp ? new Date(event.timestamp).toLocaleString() : 'Pending';

      return (
        '<div class="timeline-item ' + cls + '">' +
          '<div class="timeline-dot"></div>' +
          '<div class="timeline-title">' + escapeHtml(event.title || '') + '</div>' +
          '<div class="timeline-desc">' + escapeHtml(event.description || '') + '</div>' +
          '<div class="timeline-date">' + escapeHtml(dateDisplay) + '</div>' +
        '</div>'
      );
    }).join('');
  }

  function displayOrdersList(orders) {
    const container = document.getElementById('orderDetails');
    let html = '<div style="margin-bottom:20px;"><h3 style="color:#6C2929;">Found ' + orders.length + ' Order(s)</h3></div>';

    for (let i = 0; i < orders.length; i++) {
      const order = orders[i];

      const orderNumber = order._id ? order._id.toString().slice(-8).toUpperCase() : 'UNKNOWN';
      const orderDate = order.createdAt ? new Date(order.createdAt).toLocaleDateString() : 'N/A';
      const statusText = order.paymentStatus === 'paid' ? 'Paid' : 'Processing';
      const statusColor = order.paymentStatus === 'paid' ? '#d1fae5' : '#fef3c7';
      const statusTextColor = order.paymentStatus === 'paid' ? '#065f46' : '#92400e';

      const tracking = order.tracking || buildDeliveryTracking(order.createdAt, order.items || []);
      const trackStatus = getStatusText(tracking.status || 'processing');
      const trackMsg = tracking.message || 'Payment confirmed. Your order is being prepared.';
      const remainText = tracking.remainingText || '';
      const shippingDate = tracking.shippingDate ? new Date(tracking.shippingDate).toLocaleString() : 'N/A';
      const deliveryDate = tracking.deliveryDate ? new Date(tracking.deliveryDate).toLocaleString() : null;
      const timelineHtml = renderTrackingTimeline(tracking.timeline || []);

      const deliveryHtml = deliveryDate
        ? '<div style="font-size:22px;font-weight:700;color:#6C2929;margin-top:6px;">' + escapeHtml(remainText) + '</div>' +
          '<div style="color:#666;margin-top:5px;">Expected delivery: ' + escapeHtml(deliveryDate) + '</div>' +
          '<div style="color:#666;margin-top:5px;">Ships by: ' + escapeHtml(shippingDate) + '</div>'
        : '<div style="font-size:18px;font-weight:700;color:#6C2929;margin-top:6px;">' + escapeHtml(remainText) + '</div>';
      const deliveryLine = remainText
        ? '<div class="delivery-countdown-line"><i class="fa-regular fa-clock"></i><span>Time left to receive your product: <strong>' + escapeHtml(remainText) + '</strong></span></div>'
        : '';

      let itemsHtml = '';
      if (Array.isArray(order.items)) {
        for (let j = 0; j < order.items.length; j++) {
          const item = order.items[j];
          const quantity = Number(item.quantity) || 0;
          const itemTotal = ((Number(item.price) || 0) * quantity).toFixed(2);

          itemsHtml +=
            '<div class="item-row">' +
              '<span>' + escapeHtml(item.name || 'Unnamed Item') + ' x ' + quantity + '</span>' +
              '<span>LE ' + itemTotal + '</span>' +
            '</div>';
        }
      }

      const totalAmount = Number(order.amount || 0).toFixed(2);

      html +=
        '<div style="background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);">' +
          '<div style="border-bottom:1px solid #e5e7eb;padding-bottom:14px;margin-bottom:14px;">' +
            '<div style="font-size:18px;font-weight:bold;color:#6C2929;">Order #' + orderNumber + '</div>' +
            '<div style="color:#666;margin-top:5px;">Placed on ' + orderDate + '</div>' +
            '<span style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;margin-top:8px;background:' + statusColor + ';color:' + statusTextColor + ';">' + statusText + '</span>' +
            deliveryLine +
          '</div>' +
          '<div class="estimated-delivery">' +
            '<div style="font-weight:700;">' + escapeHtml(trackStatus) + '</div>' +
            '<div style="color:#666;margin-top:5px;">' + escapeHtml(trackMsg) + '</div>' +
            deliveryHtml +
          '</div>' +
          '<div class="timeline">' + timelineHtml + '</div>' +
          '<div class="items-list">' +
            '<h4 style="margin-bottom:10px;">Items</h4>' +
            itemsHtml +
            '<div class="total-row">' +
              '<span>Total Amount</span>' +
              '<span>LE ' + totalAmount + '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    container.innerHTML = html;
    container.style.display = 'block';
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  async function trackOrder() {
    const email = document.getElementById('trackEmail').value.trim();
    const errorDiv = document.getElementById('errorMessage');
    const orderDetailsDiv = document.getElementById('orderDetails');

    if (!email) {
      showError('Please enter your email address');
      return;
    }

    if (!email.includes('@') || !email.includes('.')) {
      showError('Please enter a valid email address');
      return;
    }

    orderDetailsDiv.style.display = 'none';
    errorDiv.style.display = 'none';

    const trackBtn = document.querySelector('.track-btn');
    const originalText = trackBtn.innerHTML;
    trackBtn.innerHTML = '<i class="fa-solid fa-spinner fa-pulse"></i> Tracking...';
    trackBtn.disabled = true;

    try {
      const response = await fetch(API_BASE + '/api/orders/track/email?email=' + encodeURIComponent(email));
      const data = await response.json();

      if (response.ok && data.success && Array.isArray(data.orders) && data.orders.length > 0) {
        displayOrdersList(data.orders);
      } else {
        showError('No orders found for this email address.');
      }
    } catch (error) {
      console.error('Track order error:', error);
      showError('Network error. Please try again.');
    } finally {
      trackBtn.innerHTML = originalText;
      trackBtn.disabled = false;
    }
  }

  function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
    document.getElementById('orderDetails').style.display = 'none';

    setTimeout(function() {
      if (errorDiv.style.display === 'block') errorDiv.style.display = 'none';
    }, 5000);
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (window.lucide) lucide.createIcons();

    const trackEmail = document.getElementById('trackEmail');
    if (trackEmail) {
      trackEmail.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') trackOrder();
      });
    }

    const menuIcon = document.getElementById('menuIcon');
    const navLinks = document.getElementById('navLinks');
    if (menuIcon && navLinks) {
      menuIcon.addEventListener('click', function() {
        navLinks.classList.toggle('active');
      });
    }
  });
</script>
<script src="navbar.js"></script>
</body>
</html>
