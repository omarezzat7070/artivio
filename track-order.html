<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | Artivio</title>
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
  <script src="assets/lucide.min.js"></script>
  <link rel="stylesheet" href="navbar.css">
  <style>
    :root {
      --primary: #6C2929;
      --primary-light: #8b4545;
      --bg: #fdf6ee;
      --card: #ffffff;
      --border: #e5e7eb;
      --success: #10b981;
      --pending: #f59e0b;
      --completed: #6b7280;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .track-card {
      background: var(--card);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      color: var(--primary);
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }

    .search-form {
      background: #f9f9f9;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .track-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      transition: background 0.3s;
    }

    .track-btn:hover:not(:disabled) {
      background: var(--primary-light);
    }

    .track-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .order-details {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .order-header {
      border-bottom: 2px solid var(--border);
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    .order-number {
      font-size: 20px;
      font-weight: bold;
      color: var(--primary);
    }

    .order-date {
      color: #666;
      margin-top: 5px;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
    }

    .status-pending_payment { background: #fef3c7; color: #92400e; }
    .status-processing { background: #dbeafe; color: #1e40af; }
    .status-shipped { background: #d1fae5; color: #065f46; }
    .status-in_transit { background: #fed7aa; color: #9a3412; }
    .status-delivered { background: #d1fae5; color: #065f46; }
    .status-completed { background: #e5e7eb; color: #374151; }

    .timeline {
      margin: 30px 0;
      position: relative;
      padding-left: 30px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 30px;
    }

    .timeline-dot {
      position: absolute;
      left: -30px;
      top: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 3px solid var(--border);
      z-index: 1;
    }

    .timeline-item.completed .timeline-dot {
      background: var(--success);
      border-color: var(--success);
    }

    .timeline-item.active .timeline-dot {
      background: var(--primary);
      border-color: var(--primary);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(108, 41, 41, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(108, 41, 41, 0); }
      100% { box-shadow: 0 0 0 0 rgba(108, 41, 41, 0); }
    }

    .timeline-title {
      font-weight: 600;
      margin-bottom: 5px;
    }

    .timeline-desc {
      font-size: 13px;
      color: #666;
    }

    .timeline-date {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    .items-list {
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      font-weight: bold;
      font-size: 18px;
      color: var(--primary);
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      display: none;
    }

    .estimated-delivery {
      background: #fef3c7;
      padding: 12px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: center;
    }

    @media (max-width: 600px) {
      .container { margin: 20px auto; padding: 15px; }
      .track-card { padding: 20px; }
      .timeline { padding-left: 20px; }
      .timeline-dot { left: -22px; width: 18px; height: 18px; }
    }
  </style>
</head>
<body>

<header class="navbar">
  <div class="container nav-content">
    <div class="nav-logo">
      <a href="index.html"><img src="no background 1.png" alt="Artivio Logo"></a>
      <span class="artivio">Artivio</span>
    </div>
    <nav>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html"><i data-lucide="shopping-bag" class="icon-sm"></i> Products</a></li>
        <li><a href="customercourses.html"><i data-lucide="book-open" class="icon-sm"></i> Courses</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="track-order.html"><i data-lucide="truck" class="icon-sm"></i> Track Order</a></li>
        <li><a id="loginLink" href="login.html"><i data-lucide="user" class="icon-sm"></i> Login</a></li>
      </ul>
      <div class="menu-icon" id="menuIcon">
        <i data-lucide="menu"></i>
      </div>
    </nav>
  </div>
</header>

<div class="container">
  <div class="track-card">
    <h1>Track Your Order</h1>
    <p class="subtitle">Enter your order ID and email to track your shipment</p>
    
    <div class="search-form">
      <div class="form-group">
        <label for="orderNumber">Order Number</label>
        <input type="text" id="orderNumber" placeholder="Enter your order number (e.g., 65f4a2b3c8d9e1f2a3b4c5d6)">
      </div>
      <div class="form-group">
        <label for="trackEmail">Email Address</label>
        <input type="email" id="trackEmail" placeholder="Enter the email used for this order">
      </div>
      <button class="track-btn" onclick="trackOrder()">
        <i class="fa-solid fa-search"></i> Track Order
      </button>
    </div>
    
    <div id="errorMessage" class="error-message"></div>
    <div id="orderDetails" class="order-details"></div>
  </div>
</div>

<script>
  const API_BASE = window.location.origin || 'http://localhost:7070';
  
  async function trackOrder() {
    const orderNumber = document.getElementById('orderNumber').value.trim();
    const email = document.getElementById('trackEmail').value.trim();
    const errorDiv = document.getElementById('errorMessage');
    const orderDetailsDiv = document.getElementById('orderDetails');
    
    // Input validation
    if (!orderNumber || !email) {
      showError('Please enter both order number and email address');
      return;
    }
    
    if (!email.includes('@') || !email.includes('.')) {
      showError('Please enter a valid email address');
      return;
    }
    
    // Hide previous results
    orderDetailsDiv.style.display = 'none';
    errorDiv.style.display = 'none';
    
    // Show loading
    const trackBtn = document.querySelector('.track-btn');
    const originalText = trackBtn.innerHTML;
    trackBtn.innerHTML = '<i class="fa-solid fa-spinner fa-pulse"></i> Tracking...';
    trackBtn.disabled = true;
    
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      
      const response = await fetch(`${API_BASE}/api/orders/track/${orderNumber}?email=${encodeURIComponent(email)}`, {
        signal: controller.signal
      });
      clearTimeout(timeoutId);
      
      const data = await response.json();
      
      if (response.ok && data.success) {
        displayOrderDetails(data.data);
      } else {
        showError(data.error || 'Order not found. Please check your order number and email.');
      }
    } catch (error) {
      console.error('Track order error:', error);
      if (error.name === 'AbortError') {
        showError('Request timeout. Please try again.');
      } else {
        showError('Network error. Please check your connection and try again.');
      }
    } finally {
      trackBtn.innerHTML = originalText;
      trackBtn.disabled = false;
    }
  }
  
  function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
    document.getElementById('orderDetails').style.display = 'none';
    
    // Auto hide after 5 seconds
    setTimeout(() => {
      if (errorDiv.style.display === 'block') {
        errorDiv.style.display = 'none';
      }
    }, 5000);
  }
  
  function displayOrderDetails(order) {
    const container = document.getElementById('orderDetails');
    
    const statusClass = `status-${order.orderStatus}`;
    const statusText = getStatusText(order.orderStatus);
    
    let itemsHtml = '';
    order.items.forEach(item => {
      itemsHtml += `
        <div class="item-row">
          <span>${escapeHtml(item.name)} x ${item.quantity}</span>
          <span>LE ${(item.price * item.quantity).toFixed(2)}</span>
        </div>
      `;
    });
    
    let timelineHtml = '';
    order.timeline.forEach((event, index) => {
      const isCompleted = event.completed;
      const currentStatusIndex = order.timeline.findIndex(e => e.status === order.orderStatus);
      const isActive = !isCompleted && currentStatusIndex === index;
      const statusClass = isCompleted ? 'completed' : (isActive ? 'active' : '');
      const dateDisplay = event.timestamp ? new Date(event.timestamp).toLocaleDateString() : 'Pending';
      
      timelineHtml += `
        <div class="timeline-item ${statusClass}">
          <div class="timeline-dot"></div>
          <div class="timeline-title">${escapeHtml(event.title)}</div>
          <div class="timeline-desc">${escapeHtml(event.description)}</div>
          <div class="timeline-date">${dateDisplay}</div>
        </div>
      `;
    });
    
    container.innerHTML = `
      <div class="order-header">
        <div class="order-number">Order #${escapeHtml(order.orderNumber)}</div>
        <div class="order-date">Placed on ${new Date(order.date).toLocaleDateString()}</div>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>
      
      ${order.estimatedDelivery ? `
        <div class="estimated-delivery">
          <i class="fa-solid fa-truck"></i> Estimated Delivery: ${order.estimatedDelivery}
        </div>
      ` : ''}
      
      <div class="timeline">
        ${timelineHtml}
      </div>
      
      <div class="items-list">
        <h3 style="margin-bottom: 15px;">Order Items</h3>
        ${itemsHtml}
        <div class="total-row">
          <span>Total Amount</span>
          <span>LE ${order.amount.toFixed(2)}</span>
        </div>
      </div>
    `;
    
    container.style.display = 'block';
    
    // Scroll to order details
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  
  function getStatusText(status) {
    const statusMap = {
      'pending_payment': 'Pending Payment',
      'processing': 'Processing',
      'shipped': 'Shipped',
      'in_transit': 'In Transit',
      'delivered': 'Delivered',
      'completed': 'Completed'
    };
    return statusMap[status] || status;
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // Enter key support
  document.getElementById('orderNumber')?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') trackOrder();
  });
  document.getElementById('trackEmail')?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') trackOrder();
  });
  
  document.addEventListener('DOMContentLoaded', function() {
    if (window.lucide) lucide.createIcons();
    
    const menuIcon = document.getElementById('menuIcon');
    const navLinks = document.getElementById('navLinks');
    if (menuIcon && navLinks) {
      menuIcon.addEventListener('click', () => navLinks.classList.toggle('active'));
    }
  });
</script>
<script src="navbar.js"></script>
</body>
</html>
